<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SLATE — Watch</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
    .audio-wrap {
      position: absolute; top: 12px; right: 12px; z-index: 20;
    }
    .audio-btn {
      display: flex; align-items: center; gap: 6px;
      background: rgba(0,0,0,0.65); backdrop-filter: blur(6px);
      color: #fff; border: none; padding: 6px 12px;
      border-radius: 8px; cursor: pointer; font-size: 13px; font-family: inherit;
      transition: background 0.15s;
    }
    .audio-btn:hover { background: rgba(0,0,0,0.85); }
    .audio-menu {
      position: absolute; right: 0; top: calc(100% + 6px);
      background: rgba(15,15,15,0.95); backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px; overflow: hidden; min-width: 160px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      display: none;
    }
    .audio-menu.open { display: block; }
    .audio-menu-label {
      font-size: 10px; font-weight: 600; letter-spacing: 0.08em;
      color: rgba(255,255,255,0.4); text-transform: uppercase;
      padding: 10px 14px 6px;
    }
    .audio-track-btn {
      display: flex; align-items: center; gap: 8px;
      width: 100%; padding: 8px 14px;
      color: #fff; background: none; border: none;
      cursor: pointer; font-size: 13px; font-family: inherit; text-align: left;
      transition: background 0.1s;
    }
    .audio-track-btn:hover { background: rgba(255,255,255,0.08); }
    .audio-track-btn.active { color: #60a5fa; }
    .audio-track-btn .track-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: currentColor; flex-shrink: 0; opacity: 0;
    }
    .audio-track-btn.active .track-dot { opacity: 1; }

    /* ── Splash screen ───────────────────────────────────────────────────── */
    .splash-overlay {
      position: fixed; inset: 0; z-index: 100;
      background: #000; display: flex; flex-direction: column;
      justify-content: flex-end; cursor: pointer;
      transition: opacity 0.6s;
    }
    .splash-overlay.hidden { opacity: 0; pointer-events: none; }
    .splash-bg {
      position: absolute; inset: 0;
      background-size: cover; background-position: center top;
      filter: blur(24px) brightness(0.25); transform: scale(1.06);
    }
    .splash-content {
      position: relative; z-index: 1;
      padding: 48px 60px; max-width: 720px;
    }
    .splash-show-label {
      font-size: 12px; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: rgba(255,255,255,0.45);
      margin-bottom: 10px;
    }
    .splash-ep-title {
      font-size: 34px; font-weight: 700; color: #fff;
      line-height: 1.15; margin-bottom: 18px;
    }
    .splash-synopsis {
      font-size: 15px; color: rgba(255,255,255,0.65);
      line-height: 1.65; margin-bottom: 36px;
      display: -webkit-box; -webkit-line-clamp: 4;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .splash-bar-wrap {
      width: 100%; height: 2px;
      background: rgba(255,255,255,0.15); border-radius: 2px;
      margin-bottom: 14px; overflow: hidden;
    }
    .splash-bar { height: 100%; width: 0%; background: #fff; border-radius: 2px; }
    .splash-hint { font-size: 12px; color: rgba(255,255,255,0.3); }
  </style>
</head>
<body class="watch-page">

<header class="watch-header">
  <a class="watch-back" href="/browse.html" id="back-link">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
    Back
  </a>
  <div class="watch-title-wrap" id="watch-title-wrap">
    <span class="watch-title" id="watch-title"></span>
  </div>
</header>

<div class="watch-video-wrap" style="position:relative">
  <video class="watch-video" id="player" controls playsinline></video>

  <!-- Stream loading overlay (shown after splash, hidden when canplay fires) -->
  <div id="stream-loading" style="display:none;position:absolute;inset:0;background:#000;z-index:10;align-items:center;justify-content:center;flex-direction:column;gap:16px">
    <div class="spinner" style="width:36px;height:36px;border-width:3px"></div>
    <p id="stream-loading-msg" style="color:rgba(255,255,255,0.45);font-size:14px;margin:0">Connecting to stream…</p>
  </div>

  <!-- Audio track selector -->
  <div class="audio-wrap" id="audio-wrap" style="display:none">
    <button class="audio-btn" id="audio-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
      </svg>
      Audio
    </button>
    <div class="audio-menu" id="audio-menu">
      <div class="audio-menu-label">Audio Track</div>
      <div id="audio-track-list"></div>
    </div>
  </div>
</div>

<!-- Splash screen -->
<div class="splash-overlay" id="splash">
  <div class="splash-bg" id="splash-bg"></div>
  <div class="splash-content">
    <div class="splash-show-label" id="splash-show-label"></div>
    <div class="splash-ep-title" id="splash-ep-title"></div>
    <div class="splash-synopsis" id="splash-synopsis"></div>
    <div class="splash-bar-wrap"><div class="splash-bar" id="splash-bar"></div></div>
    <div class="splash-hint">Click anywhere to play now</div>
  </div>
</div>

<script src="/js/hls.min.js"></script>
<script type="module">
  import { requireLogin, addToHistory, updateProgress } from '/js/api.js';
  import { initTheme } from '/js/utils.js';
  initTheme();

  await requireLogin();

  const params = new URLSearchParams(location.search);
  let rawUrl = params.get('url');

  // Apply preferred audio track index (set in Settings)
  const prefAudioIdx = parseInt(localStorage.getItem('slate_audio_idx') ?? '-1');
  if (prefAudioIdx >= 0 && rawUrl && rawUrl.includes('/stream/')) {
    rawUrl = rawUrl.replace(
      /(\/stream\/[^/]+\/)([^/]+)(\/[^/]+\/[^/]+\/playlist\.m3u8)/,
      `$1${prefAudioIdx}$3`
    );
  }
  const title = params.get('title') || '';
  const tmdbId = params.get('tmdbId');
  const mediaType = params.get('mediaType') || 'movie';
  const startProgress = parseFloat(params.get('startProgress') || '0');
  let season = params.get('season');
  let episode = params.get('episode');
  const episodeName = params.get('episodeName') || '';

  // Fallback: split old-style titles like "Show Name S01E01" automatically
  let displayTitle = title;
  let episodeLabel = null;
  if (season && episode) {
    episodeLabel = `S${Number(season)}E${Number(episode)}${episodeName ? ': ' + episodeName : ''}`;
  } else {
    const m = title.match(/^(.*?)\s+(S(\d+)E(\d+))$/i);
    if (m) {
      displayTitle = m[1];
      episodeLabel = m[2].toUpperCase();
    }
  }

  document.title = episodeLabel ? `SLATE — ${displayTitle} ${episodeLabel}` : `SLATE — ${title}`;
  document.getElementById('watch-title').textContent = displayTitle;
  if (episodeLabel) {
    const sub = document.createElement('span');
    sub.className = 'watch-subtitle';
    sub.textContent = episodeLabel;
    document.getElementById('watch-title-wrap').appendChild(sub);
  }

  if (!rawUrl) {
    document.querySelector('.watch-video-wrap').innerHTML = '<p style="color:#fff;padding:40px">No stream URL provided.</p>';
    throw new Error('no url');
  }

  const isHls = params.get('hls') === '1'
    || rawUrl.includes('.m3u8')
    || rawUrl.includes('/hls')
    || rawUrl.includes('torbox.app');

  // TorBox CDN IP-locks the stream token to the viewer's IP, so segments
  // must be fetched directly by the browser — server-side proxy gets rejected.
  const streamUrl = rawUrl;

  console.log('[SLATE] isHls:', isHls, '| url:', rawUrl.slice(0, 80));

  const video = document.getElementById('player');
  let hlsInstance = null;
  let currentTrackIndex = null; // for torbox muxed track switching

  // ── Audio track selector ──────────────────────────────────────────────────
  const audioWrap = document.getElementById('audio-wrap');
  const audioBtn  = document.getElementById('audio-btn');
  const audioMenu = document.getElementById('audio-menu');
  const trackList = document.getElementById('audio-track-list');

  audioBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    audioMenu.classList.toggle('open');
  });
  document.addEventListener('click', () => audioMenu.classList.remove('open'));

  function buildTrackMenu(tracks, type) {
    if (!tracks.length) return;
    audioWrap.style.display = '';
    trackList.innerHTML = '';

    // Determine currently-active index from the current rawUrl
    const activeIdxMatch = rawUrl?.match(/\/stream\/[^/]+\/([^/]+)\//);
    const activeIdx = activeIdxMatch ? parseInt(activeIdxMatch[1]) : -1;

    tracks.forEach((t, i) => {
      const btn = document.createElement('button');
      const isCurrent = type === 'torbox'
        ? (t.index === activeIdx || (activeIdx === -1 && t.isDefault))
        : t.isDefault;
      btn.className = 'audio-track-btn' + (isCurrent ? ' active' : '');
      const label = t.name + (t.lang ? ` (${t.lang})` : '');
      btn.innerHTML = `<span class="track-dot"></span>${label}`;

      btn.addEventListener('click', () => {
        trackList.querySelectorAll('.audio-track-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        audioMenu.classList.remove('open');

        if (type === 'hls' && hlsInstance) {
          // HLS.js native audio track switch
          hlsInstance.audioTrack = i;
        } else if (type === 'torbox') {
          // Swap audio index in the TorBox CDN URL and reload
          const newRawUrl = rawUrl.replace(
            /(\/stream\/[^/]+\/)([^/]+)(\/[^/]+\/[^/]+\/playlist\.m3u8)/,
            `$1${t.index}$3`
          );
          const newStreamUrl = newRawUrl;
          const pos = video.currentTime;
          if (hlsInstance) {
            hlsInstance.loadSource(newStreamUrl);
            hlsInstance.once(Hls.Events.MANIFEST_PARSED, () => {
              video.currentTime = pos;
              video.play().catch(() => {});
            });
          } else {
            video.src = newStreamUrl;
            video.currentTime = pos;
            video.play().catch(() => {});
          }
        }
      });

      trackList.appendChild(btn);
    });
  }

  async function discoverTracks() {
    try {
      const res = await fetch(`/api/stream-tracks?url=${encodeURIComponent(rawUrl)}`);
      const { tracks, type } = await res.json();
      console.log('[SLATE] audio tracks discovered:', tracks, 'type:', type);
      if (tracks.length > 1) buildTrackMenu(tracks, type);
    } catch (e) {
      console.log('[SLATE] track discovery failed:', e.message);
    }
  }

  // ── Load video ────────────────────────────────────────────────────────────
  function loadVideo(url) {
    if (isHls || url.includes('.m3u8')) {
      if (typeof Hls !== 'undefined' && Hls.isSupported()) {
        console.log('[SLATE] using HLS.js');
        hlsInstance = new Hls({
          enableWorker: true,
          startFragPrefetch: true,
          lowLatencyMode: false,
          // Start at lowest quality level, let ABR step up once buffered
          startLevel: 0,
          abrEwmaDefaultEstimate: 1000000, // 1 Mbps — forces lowest quality initially
          // Buffer aggressively so slow CDN fetches don't stall playback
          maxBufferLength: 60,
          maxMaxBufferLength: 120,
          maxBufferHole: 2,
          // Generous timeouts & retries for TorBox CDN
          manifestLoadingTimeOut: 30000,
          fragLoadingTimeOut: 60000,
          fragLoadingMaxRetry: 8,
          fragLoadingRetryDelay: 2000,
          manifestLoadingMaxRetry: 4,
          manifestLoadingRetryDelay: 2000,
        });
        hlsInstance.loadSource(url);
        hlsInstance.attachMedia(video);

        // Error recovery — preserve playback position
        let recovering = false;
        let manifestRetries = 0;
        const MAX_MANIFEST_RETRIES = 8;
        hlsInstance.on(Hls.Events.ERROR, (_, data) => {
          console.error('[SLATE] HLS error', data.type, data.details, 'fatal:', data.fatal, 'status:', data.response?.code);

          // Buffer stall — kick the loader and nudge playback to resume
          if (data.details === Hls.ErrorDetails.BUFFER_STALLED_ERROR) {
            hlsInstance.startLoad();
            if (video.paused) video.play().catch(() => {});
            return;
          }

          if (!data.fatal || recovering) return;

          // Manifest not ready yet (TorBox still transcoding) — retry
          if (data.details === Hls.ErrorDetails.MANIFEST_LOAD_TIMEOUT
              || data.details === Hls.ErrorDetails.MANIFEST_LOAD_ERROR) {
            if (manifestRetries < MAX_MANIFEST_RETRIES) {
              manifestRetries++;
              recovering = true;
              console.log(`[SLATE] manifest not ready, retry ${manifestRetries}/${MAX_MANIFEST_RETRIES}`);
              const msg = document.getElementById('stream-loading-msg');
              if (msg) msg.textContent = `Stream loading on TorBox… (${manifestRetries}/${MAX_MANIFEST_RETRIES})`;
              setTimeout(() => { hlsInstance.destroy(); recovering = false; loadVideo(url); }, 5000);
              return;
            }
          }

          recovering = true;
          const pos = video.currentTime;
          if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
            hlsInstance.startLoad();
            recovering = false;
          } else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
            hlsInstance.recoverMediaError();
            hlsInstance.once(Hls.Events.MANIFEST_PARSED, () => {
              video.currentTime = pos;
              video.play().catch(() => {});
              recovering = false;
            });
          } else {
            recovering = false;
          }
        });

        // Audio track detection — try HLS.js native tracks first,
        // then client-side manifest parse (avoids server proxy to TorBox CDN)
        hlsInstance.on(Hls.Events.AUDIO_TRACKS_UPDATED, (_, { audioTracks }) => {
          if (audioTracks.length > 1) {
            buildTrackMenu(audioTracks.map((t, i) => ({
              index: i, name: t.name || t.lang || `Track ${i + 1}`, lang: t.lang, isDefault: i === 0,
            })), 'hls');
          }
        });

        hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
          discoverTracks();
        });
      } else {
        video.src = url;
        video.addEventListener('loadedmetadata', discoverTracks, { once: true });
      }
    } else {
      video.src = url;
    }
  }

  // ── Splash screen ──────────────────────────────────────────────────────
  const posterPath = params.get('posterPath') || null;
  const splashEl = document.getElementById('splash');
  const splashBg = document.getElementById('splash-bg');

  if (posterPath) splashBg.style.backgroundImage = `url(https://image.tmdb.org/t/p/w780${posterPath})`;
  document.getElementById('splash-show-label').textContent = displayTitle;
  document.getElementById('splash-ep-title').textContent = episodeLabel || displayTitle;

  // Fetch synopsis from TMDB
  (async () => {
    try {
      let path = mediaType === 'tv' && season && episode
        ? `/3/tv/${tmdbId}/season/${season}/episode/${episode}`
        : mediaType === 'tv'
          ? `/3/tv/${tmdbId}`
          : `/3/movie/${tmdbId}`;
      const res = await fetch(`/api/tmdb?path=${encodeURIComponent(path)}`);
      const data = await res.json();
      if (data.overview) document.getElementById('splash-synopsis').textContent = data.overview;
      // Wide art: episode still for TV episodes, backdrop for everything else
      const isTvEp = mediaType === 'tv' && season && episode;
      const wide = isTvEp ? data.still_path : data.backdrop_path;
      const imgPath = wide || params.get('posterPath');
      if (imgPath) splashBg.style.backgroundImage = `url(https://image.tmdb.org/t/p/w1280${imgPath})`;
    } catch {}
  })();

  // Start loading video in the background while splash shows
  loadVideo(streamUrl);

  // Animate the progress bar over 15 seconds
  let splashDone = false;
  const bar = document.getElementById('splash-bar');
  requestAnimationFrame(() => {
    bar.style.transition = 'width 15s linear';
    bar.style.width = '100%';
  });

  function dismissSplash() {
    if (splashDone) return;
    splashDone = true;
    splashEl.classList.add('hidden');
    setTimeout(() => splashEl.remove(), 650);
    const streamLoading = document.getElementById('stream-loading');
    // If video already has enough data (canplay fired before splash dismissed), play immediately
    if (video.readyState >= 3) {
      video.play().catch(() => {});
    } else {
      streamLoading.style.display = 'flex';
      video.addEventListener('canplay', () => {
        streamLoading.style.display = 'none';
        video.play().catch(() => {});
      }, { once: true });
      video.play().catch(() => {});
    }
  }

  splashEl.addEventListener('click', dismissSplash);
  setTimeout(dismissSplash, 15000);

  // Resume from saved progress
  let seeked = false;
  video.addEventListener('loadedmetadata', () => {
    if (!seeked && startProgress > 0.01 && startProgress < 0.99) {
      video.currentTime = video.duration * startProgress;
      seeked = true;
    }
  });

  // Save to history on start
  if (tmdbId) {
    const entry = { id: Number(tmdbId), type: mediaType, title, posterPath, progress: startProgress };
    if (season && episode) {
      entry.season = Number(season);
      entry.episode = Number(episode);
      if (episodeName) entry.episodeName = episodeName;
    }
    addToHistory(entry);
  }

  // Update progress periodically
  let progressTimer;
  function saveProgress() {
    if (!tmdbId || !video.duration) return;
    const pct = video.currentTime / video.duration;
    updateProgress(Number(tmdbId), mediaType, pct);
  }
  video.addEventListener('timeupdate', () => {
    clearTimeout(progressTimer);
    progressTimer = setTimeout(saveProgress, 5000);
  });
  window.addEventListener('beforeunload', saveProgress);

  if (params.get('fullscreen') === '1') {
    video.addEventListener('canplay', () => {
      if (document.fullscreenEnabled) video.requestFullscreen().catch(() => {});
    }, { once: true });
  }
</script>
</body>
</html>
