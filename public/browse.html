<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SLATE</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
    #intro-overlay {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg); pointer-events: none;
      animation: intro-overlay-out 0.7s ease 2.9s forwards;
    }
    #intro-logo {
      font-size: 56px; font-weight: 800; letter-spacing: -0.05em; color: var(--fg);
      animation: intro-focus 3.2s ease forwards;
    }
    @keyframes intro-focus {
      0%   { filter: blur(32px); opacity: 0; }
      12%  { filter: blur(32px); opacity: 0.8; }
      55%  { filter: blur(0);    opacity: 1; }
      78%  { filter: blur(0);    opacity: 1; }
      100% { filter: blur(0);    opacity: 0; }
    }
    @keyframes intro-overlay-out { to { opacity: 0; } }
    .intro-active .header    { opacity: 0; animation: fade-from-top 0.9s ease 3.1s forwards; }
    .intro-active .page-main { opacity: 0; animation: fade-from-top 1.1s ease 3.4s forwards; }
    @keyframes fade-from-top {
      from { opacity: 0; transform: translateY(-18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<div id="intro-overlay"><span id="intro-logo">SLATE</span></div>

<!-- ── Header ──────────────────────────────────────────────────────────────── -->
<header class="header">
  <a class="header-logo" href="/browse.html">SLATE</a>

  <!-- Search -->
  <div class="search-wrap" style="margin-left:16px">
    <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input class="search-input" id="search-input" type="search" placeholder="Search…" autocomplete="off" />
    <div class="search-dropdown" id="search-dropdown" style="display:none"></div>
  </div>

  <div class="header-spacer"></div>
  <nav class="header-nav">
    <button class="header-link" id="watchlist-btn">Watchlist</button>
    <button class="header-link" id="history-btn">History</button>
    <button class="header-link" id="settings-btn">Settings</button>
    <button class="header-icon-btn" id="theme-btn" title="Toggle theme">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
    </button>
    <button class="header-icon-btn" id="logout-btn" title="Sign out">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
    </button>
  </nav>
</header>

<!-- ── Main content ────────────────────────────────────────────────────────── -->
<main class="page-main">
  <div id="main-content">
    <!-- Loading skeletons (plain HTML, no template literals) -->
    <div class="section">
      <div class="skeleton-strong" style="height:20px;width:160px;margin-bottom:14px"></div>
      <div class="cw-row">
        <div class="cw-item"><div class="skeleton cw-poster"></div><div class="skeleton" style="height:12px;width:80%;margin-top:7px"></div></div>
        <div class="cw-item"><div class="skeleton cw-poster"></div><div class="skeleton" style="height:12px;width:80%;margin-top:7px"></div></div>
        <div class="cw-item"><div class="skeleton cw-poster"></div><div class="skeleton" style="height:12px;width:80%;margin-top:7px"></div></div>
        <div class="cw-item"><div class="skeleton cw-poster"></div><div class="skeleton" style="height:12px;width:80%;margin-top:7px"></div></div>
        <div class="cw-item"><div class="skeleton cw-poster"></div><div class="skeleton" style="height:12px;width:80%;margin-top:7px"></div></div>
      </div>
    </div>
    <div class="section">
      <div class="skeleton-strong" style="height:20px;width:180px;margin-bottom:14px"></div>
      <div class="marquee-row">
        <div class="marquee-item"><div class="skeleton marquee-poster"></div><div class="skeleton" style="height:12px;width:80%;margin-top:7px"></div></div>
        <div class="marquee-item"><div class="skeleton marquee-poster"></div><div class="skeleton" style="height:12px;width:80%;margin-top:7px"></div></div>
        <div class="marquee-item"><div class="skeleton marquee-poster"></div><div class="skeleton" style="height:12px;width:80%;margin-top:7px"></div></div>
        <div class="marquee-item"><div class="skeleton marquee-poster"></div><div class="skeleton" style="height:12px;width:80%;margin-top:7px"></div></div>
        <div class="marquee-item"><div class="skeleton marquee-poster"></div><div class="skeleton" style="height:12px;width:80%;margin-top:7px"></div></div>
        <div class="marquee-item"><div class="skeleton marquee-poster"></div><div class="skeleton" style="height:12px;width:80%;margin-top:7px"></div></div>
        <div class="marquee-item"><div class="skeleton marquee-poster"></div><div class="skeleton" style="height:12px;width:80%;margin-top:7px"></div></div>
        <div class="marquee-item"><div class="skeleton marquee-poster"></div><div class="skeleton" style="height:12px;width:80%;margin-top:7px"></div></div>
      </div>
    </div>
    <div class="section">
      <div class="skeleton-strong" style="height:20px;width:200px;margin-bottom:14px"></div>
      <div class="marquee-row">
        <div class="marquee-item"><div class="skeleton marquee-poster"></div><div class="skeleton" style="height:12px;width:80%;margin-top:7px"></div></div>
        <div class="marquee-item"><div class="skeleton marquee-poster"></div><div class="skeleton" style="height:12px;width:80%;margin-top:7px"></div></div>
        <div class="marquee-item"><div class="skeleton marquee-poster"></div><div class="skeleton" style="height:12px;width:80%;margin-top:7px"></div></div>
        <div class="marquee-item"><div class="skeleton marquee-poster"></div><div class="skeleton" style="height:12px;width:80%;margin-top:7px"></div></div>
        <div class="marquee-item"><div class="skeleton marquee-poster"></div><div class="skeleton" style="height:12px;width:80%;margin-top:7px"></div></div>
        <div class="marquee-item"><div class="skeleton marquee-poster"></div><div class="skeleton" style="height:12px;width:80%;margin-top:7px"></div></div>
        <div class="marquee-item"><div class="skeleton marquee-poster"></div><div class="skeleton" style="height:12px;width:80%;margin-top:7px"></div></div>
        <div class="marquee-item"><div class="skeleton marquee-poster"></div><div class="skeleton" style="height:12px;width:80%;margin-top:7px"></div></div>
      </div>
    </div>
  </div>
</main>

<!-- ── Side Panel ──────────────────────────────────────────────────────────── -->
<div class="panel-backdrop" id="panel-backdrop"></div>
<div class="side-panel" id="side-panel">
  <div class="panel-close-bar">
    <button class="panel-close-btn" id="panel-close">✕</button>
  </div>
  <div class="panel-body" id="panel-body"></div>
</div>

<script type="module">
  import { requireLogin, logout, getMe, getTrending, searchMulti, getMovieDetails, getTVDetails, getHistory, removeFromHistory, addToHistory, updateProgress, addToWatchlist, removeFromWatchlist, getWatchlist, searchTorrents, startStreaming, startStreamingRD, getSeasonDetails, getSettings, saveApiKey, saveRDApiKey } from '/js/api.js';
  import { initTheme, toggleTheme, posterURL, getYear, ratingToPercent, formatBytes, debounce } from '/js/utils.js';
  initTheme();

  // Play intro only on reload or when coming from login/register
  const navType = performance.getEntriesByType('navigation')[0]?.type;
  const fromLogin = ['', location.origin + '/', location.origin + '/index.html', location.origin + '/register.html']
    .some(u => document.referrer === u || document.referrer.replace(/\/$/, '') === u.replace(/\/$/, ''));
  const playIntro = navType === 'reload' || fromLogin;

  if (playIntro) {
    document.body.classList.add('intro-active');
    setTimeout(() => document.getElementById('intro-overlay')?.remove(), 4500);
  } else {
    document.getElementById('intro-overlay')?.remove();
  }

  await requireLogin();

  // Check which streaming backend is available
  const userSettings = await getSettings();
  const useRD = userSettings.hasRDKey;

  document.getElementById('theme-btn').addEventListener('click', toggleTheme);
  document.getElementById('logout-btn').addEventListener('click', async () => {
    await logout(); window.location.href = '/';
  });

  let panelId = null, panelType = null, panelInWatchlist = false;
  let history = [], watchedIds = new Set(), watchlistIds = new Set();

  // ── Load all data ──────────────────────────────────────────────────────────
  const [movies, shows, historyData, watchlistData] = await Promise.all([
    getTrending('movie'),
    getTrending('tv'),
    getHistory(),
    getWatchlist(),
  ]);
  history = historyData;
  watchedIds = new Set(history.map(h => `${h.id}-${h.type}`));
  watchlistIds = new Set(watchlistData.map(w => `${w.tmdb_id}-${w.media_type}`));

  renderAll();

  function renderAll() {
    document.getElementById('main-content').innerHTML = `
      ${renderContinueWatching()}
      ${renderMarquee('Trending Movies', movies, 'movie')}
      ${renderMarquee('Trending TV Shows', shows, 'tv')}
    `;
    attachMarqueeListeners();
    attachCWListeners();
  }

  // ── Continue Watching ──────────────────────────────────────────────────────
  function renderContinueWatching() {
    const inProgress = history.filter(h => (h.progress || 0) < 0.9);
    if (inProgress.length === 0) return '';
    return `<div class="section">
      <h2 class="section-title">Continue Watching</h2>
      <div class="cw-row">${inProgress.map(item => {
        const poster = item.posterPath ? posterURL(item.posterPath, 'w300') : null;
        const pct = Math.round((item.progress || 0) * 100);
        const done = pct >= 90;
        return `<div class="cw-item" data-id="${item.id}" data-type="${item.type}" data-progress="${item.progress || 0}" data-title="${escAttr(item.title)}" data-poster="${escAttr(item.posterPath || '')}" data-season="${item.season ?? ''}" data-episode="${item.episode ?? ''}" data-episode-name="${escAttr(item.episodeName || '')}">
          <div class="cw-poster">
            ${poster ? `<img src="${poster}" alt="${escHtml(item.title)}" loading="lazy" />` : ''}
            ${done ? `<div class="watched-badge">✓</div>` : ''}
            <div class="cw-play-btn">
              <div class="cw-play-icon">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="black"><polygon points="5 3 19 12 5 21 5 3"/></svg>
              </div>
            </div>
            <div class="progress-bar-wrap">
              <div class="progress-bar-fill" style="width:${pct}%"></div>
            </div>
            <button class="cw-check" data-id="${item.id}" data-type="${item.type}" title="Mark as watched">
              <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"/>
              </svg>
            </button>
            <button class="cw-remove" data-id="${item.id}" data-type="${item.type}" title="Remove">
              <svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round">
                <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
              </svg>
            </button>
          </div>
          ${(() => {
            let showTitle = item.title || '';
            let epLabel = item.season != null
              ? `S${item.season}E${item.episode}${item.episodeName ? ': ' + item.episodeName : ''}`
              : null;
            if (!epLabel) {
              const m = showTitle.match(/^(.*?)\s+(S\d+E\d+)$/i);
              if (m) { showTitle = m[1]; epLabel = m[2].toUpperCase(); }
            }
            return `<div class="cw-title">${escHtml(showTitle)}</div>${epLabel ? `<div class="cw-subtitle">${escHtml(epLabel)}</div>` : ''}`;
          })()}
        </div>`;
      }).join('')}</div>
    </div>`;
  }

  function attachCWListeners() {
    document.querySelectorAll('.cw-check').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        e.stopPropagation();
        const id = Number(btn.dataset.id), type = btn.dataset.type;
        const entry = history.find(h => h.id === id && h.type === type);
        if (entry) entry.progress = 1;
        renderAll();
        await updateProgress(id, type, 1);
      });
    });

    document.querySelectorAll('.cw-remove').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        e.stopPropagation();
        const id = Number(btn.dataset.id), type = btn.dataset.type;
        history = history.filter(h => !(h.id === id && h.type === type));
        watchedIds = new Set(history.map(h => `${h.id}-${h.type}`));
        renderAll();
        await removeFromHistory(id, type);
      });
    });

    document.querySelectorAll('.cw-item').forEach(item => {
      // Click poster area → open panel; click play overlay → stream
      item.querySelector('.cw-poster').addEventListener('click', async (e) => {
        if (e.target.closest('.cw-remove')) return;
        if (e.target.closest('.cw-play-btn')) {
          const tmdbId = Number(item.dataset.id);
          const mediaType = item.dataset.type;
          const title = item.dataset.title;
          const posterPath = item.dataset.poster || null;
          const startProgress = parseFloat(item.dataset.progress || '0');
          const season = item.dataset.season ? Number(item.dataset.season) : null;
          const episode = item.dataset.episode ? Number(item.dataset.episode) : null;
          const episodeName = item.dataset.episodeName || null;
          const modalEl = showProgressModal(title);
          try {
            const res = await searchTorrents(tmdbId, mediaType, season, episode);
            const torrents = res.data || [];
            if (!torrents.length) throw new Error('No sources found');
            const best = torrents[0];
            const magnet = best.magnet || `magnet:?xt=urn:btih:${best.hash}`;
            const streamFn = useRD ? startStreamingRD : startStreaming;
            const { url, filename } = await streamFn(magnet, (pct, status) => {
              const fill = modalEl.querySelector('.modal-progress-fill');
              if (fill) fill.style.width = `${pct}%`;
              const label = modalEl.querySelector('.modal-status');
              if (label) label.textContent = status || '';
            }, season, episode);
            modalEl.remove();
            const params = new URLSearchParams({ url, title, filename });
            if (!useRD) params.set('hls', '1');
            params.set('tmdbId', String(tmdbId));
            params.set('mediaType', mediaType);
            params.set('startProgress', String(startProgress));
            if (posterPath) params.set('posterPath', posterPath);
            if (season != null) params.set('season', String(season));
            if (episode != null) params.set('episode', String(episode));
            if (episodeName) params.set('episodeName', episodeName);
            window.location.href = `/watch.html?${params}`;
          } catch (err) {
            modalEl.remove();
            if (err.code === 'NO_API_KEY') {
              showModal('API key missing', 'Please add your API key in Settings before playing.');
            } else {
              showModal('Playback failed', err.message || 'Could not start stream.');
            }
          }
          return;
        }
        openPanel(Number(item.dataset.id), item.dataset.type);
      });
    });
  }

  // ── Marquee ────────────────────────────────────────────────────────────────
  function renderMarquee(title, items, type) {
    return `<div class="section">
      <h2 class="section-title">${escHtml(title)}</h2>
      <div class="marquee-row" data-type="${type}">
        ${items.map(item => {
          const name = item.title || item.name || '';
          const poster = item.poster_path ? posterURL(item.poster_path, 'w300') : null;
          const key = `${item.id}-${type}`;
          const inWl = watchlistIds.has(key);
          const played = watchedIds.has(key);
          return `<div class="marquee-item" data-id="${item.id}" data-type="${type}" data-name="${escAttr(name)}" data-poster="${escAttr(item.poster_path || '')}">
            <div class="marquee-poster">
              ${poster ? `<img src="${poster}" alt="${escHtml(name)}" loading="lazy" />` : ''}
              <div class="marquee-quick-actions">
                <button class="quick-btn wl-quick-btn${inWl ? ' active' : ''}" title="${inWl ? 'Remove from Watchlist' : 'Add to Watchlist'}">
                  ${inWl
                    ? `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`
                    : `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`}
                </button>
                <button class="quick-btn played-quick-btn${played ? ' active' : ''}" title="${played ? 'Watch again' : 'Mark as watched'}">
                  ${played
                    ? `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1 0 .49-3.51"/></svg>`
                    : `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`}
                </button>
              </div>
            </div>
            <div class="marquee-title">${escHtml(name)}</div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }

  function attachMarqueeListeners() {
    document.querySelectorAll('.marquee-item').forEach(item => {
      const id = Number(item.dataset.id);
      const type = item.dataset.type;
      const name = item.dataset.name;
      const posterPath = item.dataset.poster || null;
      const key = `${id}-${type}`;

      // Card click → open panel (ignore if quick button clicked)
      item.addEventListener('click', (e) => {
        if (e.target.closest('.quick-btn')) return;
        openPanel(id, type);
      });

      // Watchlist quick button
      item.querySelector('.wl-quick-btn').addEventListener('click', async (e) => {
        e.stopPropagation();
        const btn = e.currentTarget;
        const adding = !watchlistIds.has(key);
        // Optimistic update
        if (adding) {
          watchlistIds.add(key);
          btn.classList.add('active');
          btn.title = 'Remove from Watchlist';
          btn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
        } else {
          watchlistIds.delete(key);
          btn.classList.remove('active');
          btn.title = 'Add to Watchlist';
          btn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`;
        }
        if (adding) {
          await addToWatchlist({ tmdbId: id, mediaType: type, title: name, posterPath });
        } else {
          await removeFromWatchlist(id, type);
        }
      });

      // Played quick button
      item.querySelector('.played-quick-btn').addEventListener('click', async (e) => {
        e.stopPropagation();
        const btn = e.currentTarget;
        const marking = !watchedIds.has(key);
        const rewindSVG = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1 0 .49-3.51"/></svg>`;
        if (marking) {
          // First time marking watched — optimistic UI update then re-render
          watchedIds.add(key);
          btn.classList.add('active');
          btn.title = 'Watch again';
          btn.innerHTML = rewindSVG;
          await addToHistory({ id, type, title: name, posterPath, progress: 1 });
          history = history.filter(h => !(h.id === id && h.type === type));
          history.unshift({ id, type, title: name, posterPath, progress: 1 });
          renderAll(); // re-render CW + marquee (shows new watch_count, removes from CW)
        } else {
          // Already watched — log another play, flash feedback on button
          btn.style.opacity = '0.4';
          await addToHistory({ id, type, title: name, posterPath, progress: 1 });
          btn.style.opacity = '';
          btn.style.color = 'var(--accent, #60a5fa)';
          setTimeout(() => { btn.style.color = ''; }, 700);
          history = await getHistory();
          renderAll(); // refresh watch_count badge in history panel
        }
      });
    });
  }

  // ── Search ─────────────────────────────────────────────────────────────────
  const searchInput = document.getElementById('search-input');
  const dropdown = document.getElementById('search-dropdown');

  const doSearch = debounce(async (q) => {
    if (!q.trim()) { dropdown.style.display = 'none'; return; }
    try {
      const results = await searchMulti(q);
      if (results.length === 0) { dropdown.style.display = 'none'; return; }
      dropdown.innerHTML = results.slice(0, 8).map(r => {
        const name = r.title || r.name || '';
        const year = getYear(r.release_date || r.first_air_date || '');
        const poster = r.poster_path ? posterURL(r.poster_path, 'w200') : null;
        return `<div class="search-result" data-id="${r.id}" data-type="${r.media_type}">
          ${poster ? `<img class="search-result-poster" src="${poster}" alt="${escHtml(name)}" />` : `<div class="search-result-poster"></div>`}
          <div class="search-result-info">
            <div class="search-result-title">${escHtml(name)}</div>
            <div class="search-result-meta">${r.media_type === 'movie' ? 'Movie' : 'TV'} ${year ? `· ${year}` : ''}</div>
          </div>
        </div>`;
      }).join('');
      dropdown.style.display = 'block';

      dropdown.querySelectorAll('.search-result').forEach(el => {
        el.addEventListener('click', () => {
          dropdown.style.display = 'none';
          searchInput.value = '';
          openPanel(Number(el.dataset.id), el.dataset.type);
        });
      });
    } catch {}
  }, 300);

  searchInput.addEventListener('input', () => doSearch(searchInput.value));
  searchInput.addEventListener('blur', () => setTimeout(() => { dropdown.style.display = 'none'; }, 200));
  searchInput.addEventListener('focus', () => { if (dropdown.innerHTML) dropdown.style.display = 'block'; });

  // ── Side Panel ─────────────────────────────────────────────────────────────
  async function openPanel(id, type) {
    panelId = id; panelType = type;
    const backdrop = document.getElementById('panel-backdrop');
    const panel = document.getElementById('side-panel');
    const body = document.getElementById('panel-body');

    body.innerHTML = `<div style="display:flex;flex-direction:column;gap:12px">
      <div class="skeleton-strong" style="height:28px;width:60%;border-radius:6px"></div>
      <div class="skeleton" style="height:300px;border-radius:10px"></div>
    </div>`;

    setTimeout(() => { backdrop.classList.add('visible'); panel.classList.add('visible'); }, 10);

    try {
      const [data, watchlist] = await Promise.all([
        type === 'movie' ? getMovieDetails(id) : getTVDetails(id),
        getWatchlist(),
      ]);
      panelInWatchlist = watchlist.some(i => i.tmdb_id === id && i.media_type === type);
      renderPanel(data, type);
    } catch {
      body.innerHTML = `<p style="color:var(--text-secondary)">Failed to load details.</p>`;
    }
  }

  function closePanel() {
    const backdrop = document.getElementById('panel-backdrop');
    const panel = document.getElementById('side-panel');
    backdrop.classList.remove('visible');
    panel.classList.remove('visible');
    setTimeout(() => { document.getElementById('panel-body').innerHTML = ''; panelId = null; }, 350);
  }

  document.getElementById('panel-backdrop').addEventListener('click', closePanel);
  document.getElementById('panel-close').addEventListener('click', closePanel);

  function renderPanel(data, type) {
    const title = data.title || data.name || '';
    const date = data.release_date || data.first_air_date || '';
    const genres = data.genres || [];
    const poster = data.poster_path ? posterURL(data.poster_path, 'w300') : null;
    const historyEntry = history.find(h => h.id === panelId && h.type === type);
    const progress = historyEntry?.progress || 0;

    document.getElementById('panel-body').innerHTML = `
      <div class="panel-header">
        ${poster ? `<img class="panel-poster" src="${poster}" alt="${escHtml(title)}" width="100" height="150" />` : ''}
        <div class="panel-meta">
          <h2 class="panel-title">${escHtml(title)}</h2>
          <p class="panel-subtitle">
            ${getYear(date)}${data.runtime ? ` · ${data.runtime} min` : ''}${data.number_of_seasons ? ` · ${data.number_of_seasons} season${data.number_of_seasons > 1 ? 's' : ''}` : ''}${data.vote_average > 0 ? ` · ${ratingToPercent(data.vote_average)}` : ''}
          </p>
          ${genres.length > 0 ? `<div class="panel-genres">${genres.slice(0,3).map(g => `<span class="badge">${escHtml(g.name)}</span>`).join('')}</div>` : ''}
        </div>
      </div>

      <div style="display:flex;gap:8px;margin-bottom:20px">
        <button class="btn ${panelInWatchlist ? 'btn-primary' : 'btn-ghost'}" id="wl-btn" style="flex:1">
          ${panelInWatchlist
            ? `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> In Watchlist`
            : `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Add to Watchlist`}
        </button>
        <div style="position:relative;flex:1" id="watched-btn-wrap">
          <button class="btn ${historyEntry && historyEntry.progress >= 0.9 ? 'btn-primary' : 'btn-ghost'}" id="watched-btn" style="width:100%">
            ${historyEntry && historyEntry.progress >= 0.9
              ? `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1 0 .49-3.51"/></svg> Watch Again`
              : `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Mark Watched`}
          </button>
          <div id="watched-dropdown" class="watched-dropdown" style="display:none">
            <button class="watched-dropdown-item" id="watched-today">Marked watched today</button>
            <button class="watched-dropdown-item" id="watched-custom-toggle">Choose a date</button>
            <div id="watched-date-picker" style="display:none;padding:8px 12px;border-top:1px solid var(--border-c)">
              <input type="date" id="watched-date-input" class="input" style="width:100%;margin-bottom:8px;font-size:13px">
              <button class="btn btn-primary" id="watched-date-confirm" style="width:100%;font-size:13px">Confirm</button>
            </div>
          </div>
        </div>
      </div>

      ${data.overview ? `<p class="panel-overview">${escHtml(data.overview)}</p>` : ''}

      ${type === 'movie' ? `
        <p class="panel-section-title">Sources</p>
        <div id="sources-area"></div>
      ` : data.seasons ? `
        <p class="panel-section-title">Episodes</p>
        <div id="seasons-area"></div>
      ` : ''}
    `;

    // Watchlist toggle
    document.getElementById('wl-btn').addEventListener('click', async () => {
      const btn = document.getElementById('wl-btn');
      btn.disabled = true;
      if (panelInWatchlist) {
        await removeFromWatchlist(panelId, panelType);
        panelInWatchlist = false;
      } else {
        await addToWatchlist({ tmdbId: panelId, mediaType: panelType, title, posterPath: data.poster_path });
        panelInWatchlist = true;
      }
      renderPanel(data, type);
    });

    // Watched button — show dropdown
    const watchedBtn = document.getElementById('watched-btn');
    const watchedDropdown = document.getElementById('watched-dropdown');

    watchedBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      const isOpen = watchedDropdown.style.display !== 'none';
      watchedDropdown.style.display = isOpen ? 'none' : 'block';
    });

    // Close dropdown when clicking outside
    document.addEventListener('click', function closeWatchedDropdown(e) {
      if (!document.getElementById('watched-btn-wrap')?.contains(e.target)) {
        if (watchedDropdown) watchedDropdown.style.display = 'none';
        document.removeEventListener('click', closeWatchedDropdown);
      }
    });

    async function doMarkWatched(watchedAt) {
      watchedDropdown.style.display = 'none';
      watchedBtn.disabled = true;
      await addToHistory({ id: panelId, type: panelType, title, posterPath: data.poster_path, progress: 1, watchedAt: watchedAt || null });
      watchedIds.add(`${panelId}-${panelType}`);
      history = history.filter(h => !(h.id === panelId && h.type === panelType));
      history.unshift({ id: panelId, type: panelType, title, posterPath: data.poster_path, progress: 1,
        watchedAt: watchedAt || new Date().toISOString() });
      renderAll();
      renderPanel(data, type);
    }

    document.getElementById('watched-today').addEventListener('click', () => doMarkWatched(null));

    document.getElementById('watched-custom-toggle').addEventListener('click', (e) => {
      e.stopPropagation();
      const picker = document.getElementById('watched-date-picker');
      picker.style.display = picker.style.display === 'none' ? 'block' : 'none';
      if (picker.style.display === 'block') {
        // Default to today
        const today = new Date().toISOString().slice(0, 10);
        document.getElementById('watched-date-input').value = today;
      }
    });

    document.getElementById('watched-date-confirm').addEventListener('click', (e) => {
      e.stopPropagation();
      const val = document.getElementById('watched-date-input').value;
      if (!val) return;
      // Convert date string "YYYY-MM-DD" to ISO datetime at noon local
      const dt = new Date(val + 'T12:00:00');
      doMarkWatched(dt.toISOString());
    });

    if (type === 'movie') loadSources(panelId, 'movie', title, data.poster_path, progress);
    else if (data.seasons) loadSeasons(panelId, title, data.seasons, data.poster_path);
  }

  // ── Sources ────────────────────────────────────────────────────────────────
  async function loadSources(tmdbId, mediaType, title, posterPath, progress) {
    const area = document.getElementById('sources-area');
    if (!area) return;
    area.innerHTML = `<div class="sources-loading"><div class="spinner"></div> Searching…</div>`;
    try {
      const res = await searchTorrents(tmdbId, mediaType);
      const torrents = res.data || [];
      if (torrents.length === 0) { area.innerHTML = `<p class="sources-empty">No sources found.</p>`; return; }
      area.innerHTML = `<div class="sources-list">${torrents.slice(0, 15).map(t => `
        <div class="source-item" data-magnet="${escAttr(t.magnet)}">
          ${t.cached ? `<span class="source-cached-badge">CACHED</span>` : ''}
          <span class="source-name">${escHtml(t.raw_title || t.name || 'Unknown')}</span>
          <span class="source-meta">${formatBytes(t.size || 0)}</span>
        </div>`).join('')}</div>`;

      area.querySelectorAll('.source-item').forEach(item => {
        item.addEventListener('click', () => handleSourceClick(item.dataset.magnet, title, tmdbId, mediaType, posterPath, progress));
      });
    } catch (err) {
      area.innerHTML = err.code === 'NO_API_KEY'
        ? `<p class="sources-empty">No TorBox API key set. <a href="/settings.html" style="color:var(--accent);text-decoration:none;font-weight:600">Go to Settings →</a></p>`
        : `<p class="sources-empty">Failed to load sources.</p>`;
    }
  }

  // ── Season/Episode picker ──────────────────────────────────────────────────
  async function loadSeasons(tvId, tvName, seasons, posterPath) {
    const area = document.getElementById('seasons-area');
    if (!area) return;
    const realSeasons = seasons.filter(s => s.season_number > 0);
    if (realSeasons.length === 0) { area.innerHTML = `<p class="sources-empty">No seasons available.</p>`; return; }

    area.innerHTML = `
      <select class="season-select" id="season-select">
        ${realSeasons.map(s => `<option value="${s.season_number}">Season ${s.season_number}</option>`).join('')}
      </select>
      <div id="episodes-list"><div class="sources-loading"><div class="spinner"></div> Loading episodes…</div></div>
    `;

    async function loadEpisodes(seasonNum) {
      const epList = document.getElementById('episodes-list');
      if (!epList) return;
      epList.innerHTML = `<div class="sources-loading"><div class="spinner"></div> Loading…</div>`;
      try {
        const season = await getSeasonDetails(tvId, seasonNum);
        const eps = season.episodes || [];
        epList.innerHTML = `<div class="episodes-list">${eps.map(ep => `
          <div class="episode-item" data-season="${seasonNum}" data-ep="${ep.episode_number}" data-name="${escHtml(ep.name || '')}">
            <span class="episode-num">E${ep.episode_number}</span>
            <span class="episode-name">${escHtml(ep.name || `Episode ${ep.episode_number}`)}</span>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text-secondary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          </div>`).join('')}</div>`;

        epList.querySelectorAll('.episode-item').forEach(item => {
          item.addEventListener('click', () => {
            const epNum = Number(item.dataset.ep);
            const epName = item.dataset.name || '';
            handleEpisodeSearch(tvId, Number(seasonNum), epNum, tvName, epName, posterPath);
          });
        });
      } catch {
        epList.innerHTML = `<p class="sources-empty">Failed to load episodes.</p>`;
      }
    }

    loadEpisodes(realSeasons[0].season_number);
    document.getElementById('season-select').addEventListener('change', e => loadEpisodes(Number(e.target.value)));
  }

  async function handleEpisodeSearch(tvId, season, episode, tvName, epName, posterPath) {
    const epLabel = `${tvName} S${String(season).padStart(2,'0')}E${String(episode).padStart(2,'0')}`;
    const res = await searchTorrents(tvId, 'tv', season, episode);
    const torrents = res.data || [];
    if (torrents.length === 0) { showModal('No sources found', `No results for ${epLabel}.`); return; }
    const best = torrents[0];
    handleSourceClick(best.magnet, tvName, tvId, 'tv', posterPath, 0, { season, episode, episodeName: epName });
  }

  // ── Streaming flow ─────────────────────────────────────────────────────────
  function handleSourceClick(magnet, title, tmdbId, mediaType, posterPath, startProgress, episodeInfo = null) {
    const modalEl = showProgressModal(title);
    const streamFn = useRD ? startStreamingRD : startStreaming;
    streamFn(magnet, (pct, status) => {
      const fill = modalEl.querySelector('.modal-progress-fill');
      const stat = modalEl.querySelector('.modal-status');
      if (fill) fill.style.width = pct + '%';
      if (stat) stat.textContent = status;
    }, episodeInfo?.season, episodeInfo?.episode)
    .then(async ({ url, filename }) => {
      // For TorBox HLS only: poll until the stream manifest is ready
      if (!useRD) {
        const stat = modalEl.querySelector('.modal-status');
        const fill = modalEl.querySelector('.modal-progress-fill');
        for (let attempt = 1; attempt <= 12; attempt++) {
          try {
            if (stat) stat.textContent = attempt === 1 ? 'Preparing stream…' : `Preparing stream… (${attempt}/12)`;
            const r = await fetch(url, { method: 'HEAD', signal: AbortSignal.timeout(8000) });
            if (r.ok) break;
          } catch {}
          if (attempt === 12) break;
          if (fill) fill.style.width = `${Math.min(95, 70 + attempt * 2)}%`;
          await new Promise(r => setTimeout(r, 5000));
        }
      }
      if (document.body.contains(modalEl)) document.body.removeChild(modalEl);
      const q = new URLSearchParams({ url, title, mediaType });
      if (!useRD) q.set('hls', '1');
      if (tmdbId) q.set('tmdbId', String(tmdbId));
      if (posterPath) q.set('posterPath', posterPath);
      if (startProgress > 0.01) q.set('startProgress', String(startProgress));
      if (episodeInfo) {
        q.set('season', String(episodeInfo.season));
        q.set('episode', String(episodeInfo.episode));
        if (episodeInfo.episodeName) q.set('episodeName', episodeInfo.episodeName);
      }
      window.location.href = `/watch.html?${q}`;
    }).catch(err => {
      if (document.body.contains(modalEl)) document.body.removeChild(modalEl);
      showModal('Error', err.message);
    });
  }

  function showProgressModal(title) {
    const el = document.createElement('div');
    el.className = 'modal-backdrop';
    el.innerHTML = `<div class="modal">
      <div class="modal-title">${escHtml(title)}</div>
      <div class="modal-subtitle">Preparing stream…</div>
      <div class="modal-progress"><div class="modal-progress-fill" style="width:0%"></div></div>
      <div class="modal-status" style="margin-top:8px;font-size:12px;color:var(--text-secondary)">Starting…</div>
    </div>`;
    document.body.appendChild(el);
    return el;
  }

  function showModal(title, msg) {
    const el = document.createElement('div');
    el.className = 'modal-backdrop';
    el.innerHTML = `<div class="modal">
      <div class="modal-title">${escHtml(title)}</div>
      <div class="modal-subtitle">${escHtml(msg)}</div>
      <button class="btn btn-primary" style="margin-top:16px">OK</button>
    </div>`;
    el.querySelector('button').addEventListener('click', () => document.body.removeChild(el));
    document.body.appendChild(el);
  }

  // ── Watchlist / History / Settings panels ──────────────────────────────────
  document.getElementById('watchlist-btn').addEventListener('click', openWatchlistPanel);
  document.getElementById('history-btn').addEventListener('click', openHistoryPanel);
  document.getElementById('settings-btn').addEventListener('click', openSettingsPanel);


  function openAuxPanel(html) {
    panelId = null; panelType = null;
    document.getElementById('panel-body').innerHTML = html;
    document.getElementById('panel-backdrop').classList.add('visible');
    document.getElementById('side-panel').classList.add('visible');
  }

  async function openWatchlistPanel() {
    openAuxPanel(`<div class="sources-loading"><div class="spinner"></div> Loading…</div>`);
    try {
      const items = await getWatchlist();
      const movies = items.filter(i => i.media_type === 'movie');
      const shows  = items.filter(i => i.media_type === 'tv');
      const renderList = (list) => list.map(i => `
        <div class="wl-item" data-id="${i.tmdb_id}" data-type="${i.media_type}">
          ${i.poster_path ? `<img class="wl-thumb" src="${posterURL(i.poster_path,'w92')}" alt="" />` : `<div class="wl-thumb wl-thumb-empty"></div>`}
          <span class="wl-title">${escHtml(i.title||i.name||'')}</span>
          <button class="wl-remove" data-id="${i.tmdb_id}" data-type="${i.media_type}">✕</button>
        </div>`).join('');
      document.getElementById('panel-body').innerHTML = `
        <h2 class="panel-title" style="margin-bottom:20px">Watchlist</h2>
        ${items.length === 0 ? `<p class="sources-empty">Your watchlist is empty.</p>` : `
          ${movies.length ? `<p class="panel-section-title">Movies</p><div class="wl-list">${renderList(movies)}</div>` : ''}
          ${shows.length  ? `<p class="panel-section-title" style="margin-top:20px">TV Shows</p><div class="wl-list">${renderList(shows)}</div>` : ''}
        `}`;
      document.querySelectorAll('.wl-item').forEach(item => {
        item.addEventListener('click', e => { if (!e.target.closest('.wl-remove')) openPanel(Number(item.dataset.id), item.dataset.type); });
      });
      document.querySelectorAll('.wl-remove').forEach(btn => {
        btn.addEventListener('click', async e => {
          e.stopPropagation();
          await removeFromWatchlist(Number(btn.dataset.id), btn.dataset.type);
          watchlistIds.delete(`${btn.dataset.id}-${btn.dataset.type}`);
          renderAll();
          openWatchlistPanel();
        });
      });
    } catch { document.getElementById('panel-body').innerHTML = `<p class="sources-empty">Failed to load.</p>`; }
  }

  async function openHistoryPanel() {
    openAuxPanel(`<div class="sources-loading"><div class="spinner"></div> Loading…</div>`);
    try {
      const all = await getHistory();
      const items = all.filter(i => (i.progress || 0) >= 0.9);
      const fmtDate = iso => {
        const d = new Date(iso + (iso.endsWith('Z') ? '' : 'Z'));
        return d.toLocaleDateString('en-US', { month:'long', day:'numeric', year:'numeric' })
          + ' at ' + d.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' });
      };
      document.getElementById('panel-body').innerHTML = `
        <h2 class="panel-title" style="margin-bottom:20px">History</h2>
        ${items.length === 0 ? `<p class="sources-empty">Nothing fully watched yet.</p>` : `
          <div class="wl-list">${items.map(i => {
            const epLabel = i.season != null
              ? `S${i.season}E${i.episode}${i.episodeName ? ': ' + i.episodeName : ''}`
              : null;
            return `<div class="hist-entry" data-id="${i.id}" data-type="${i.type}">
              <div class="hist-row">
                <div class="wl-thumb-wrap">
                  ${i.posterPath ? `<img class="wl-thumb" src="${posterURL(i.posterPath,'w92')}" alt="" />` : `<div class="wl-thumb wl-thumb-empty"></div>`}
                </div>
                <div class="wl-info">
                  <div style="display:flex;align-items:center;gap:6px">
                    <span class="wl-title">${escHtml(i.title||'')}</span>
                    ${(i.watchCount||1) > 1 ? `<span class="wl-watch-count">×${i.watchCount}</span>` : ''}
                  </div>
                  ${epLabel ? `<span class="wl-subtitle">${escHtml(epLabel)}</span>` : ''}
                  <span class="wl-timestamp">${i.watchedAt ? fmtDate(i.watchedAt) : ''}</span>
                </div>
                <button class="wl-remove hist-remove" data-id="${i.id}" data-type="${i.type}">✕</button>
              </div>
              <div class="hist-menu" style="display:none">
                <button class="hist-menu-btn hist-see-dates" data-id="${i.id}" data-type="${i.type}">
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                  See history
                  <svg class="hist-chevron" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
                </button>
                <div class="hist-dates" style="display:none"></div>
                <button class="hist-menu-btn hist-go-film" data-id="${i.id}" data-type="${i.type}">
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
                  Go to film
                </button>
                <button class="hist-menu-btn hist-clear" data-id="${i.id}" data-type="${i.type}" style="color:#ef4444">
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
                  Clear history
                </button>
              </div>
            </div>`;
          }).join('')}</div>`}`;

      document.querySelectorAll('.hist-row').forEach(row => {
        row.addEventListener('click', e => {
          if (e.target.closest('.hist-remove')) return;
          const entry = row.closest('.hist-entry');
          const menu = entry.querySelector('.hist-menu');
          const isOpen = menu.style.display !== 'none';
          // Close all others
          document.querySelectorAll('.hist-menu').forEach(m => { m.style.display = 'none'; });
          document.querySelectorAll('.hist-row').forEach(r => r.classList.remove('hist-row-active'));
          if (!isOpen) { menu.style.display = 'flex'; row.classList.add('hist-row-active'); }
        });
      });

      document.querySelectorAll('.hist-see-dates').forEach(btn => {
        btn.addEventListener('click', async e => {
          e.stopPropagation();
          const entry = btn.closest('.hist-entry');
          const datesEl = entry.querySelector('.hist-dates');
          const chevron = btn.querySelector('.hist-chevron');
          const open = datesEl.style.display !== 'none';
          if (open) {
            datesEl.style.display = 'none';
            chevron.style.transform = '';
            return;
          }
          datesEl.innerHTML = `<div class="sources-loading" style="padding:8px 0"><div class="spinner" style="width:14px;height:14px"></div></div>`;
          datesEl.style.display = 'block';
          chevron.style.transform = 'rotate(180deg)';
          try {
            const res = await fetch(`/api/history/${btn.dataset.id}/log?type=${btn.dataset.type}`);
            const data = await res.json();
            const logs = data.logs || [];
            datesEl.innerHTML = logs.length === 0
              ? `<p class="hist-date-item" style="opacity:0.5">No log entries yet</p>`
              : logs.map((l, idx) => `<div class="hist-date-item"><span class="hist-date-num">${idx + 1}</span>${fmtDate(l.watched_at)}</div>`).join('');
          } catch { datesEl.innerHTML = `<p class="hist-date-item" style="opacity:0.5">Failed to load</p>`; }
        });
      });

      document.querySelectorAll('.hist-go-film').forEach(btn => {
        btn.addEventListener('click', e => {
          e.stopPropagation();
          openPanel(Number(btn.dataset.id), btn.dataset.type);
        });
      });

      document.querySelectorAll('.hist-clear').forEach(btn => {
        btn.addEventListener('click', async e => {
          e.stopPropagation();
          btn.disabled = true;
          btn.textContent = 'Clearing…';
          const id = Number(btn.dataset.id), type = btn.dataset.type;
          await removeFromHistory(id, type);
          history = history.filter(h => !(h.id === id && h.type === type));
          watchedIds = new Set(history.map(h => `${h.id}-${h.type}`));
          renderAll();
          openHistoryPanel();
        });
      });

      document.querySelectorAll('.hist-remove').forEach(btn => {
        btn.addEventListener('click', async e => {
          e.stopPropagation();
          await removeFromHistory(Number(btn.dataset.id), btn.dataset.type);
          history = history.filter(h => !(h.id === Number(btn.dataset.id) && h.type === btn.dataset.type));
          watchedIds = new Set(history.map(h => `${h.id}-${h.type}`));
          renderAll();
          openHistoryPanel();
        });
      });
    } catch { document.getElementById('panel-body').innerHTML = `<p class="sources-empty">Failed to load.</p>`; }
  }

  async function openSettingsPanel() {
    openAuxPanel(`<div class="sources-loading"><div class="spinner"></div> Loading…</div>`);
    try {
      const [me, settings] = await Promise.all([getMe(), getSettings()]);
      document.getElementById('panel-body').innerHTML = `
        <h2 class="panel-title" style="margin-bottom:20px">Settings</h2>
        <p class="panel-section-title">Account</p>
        <p style="font-size:14px;font-weight:600;margin-bottom:4px">${escHtml(me.username||'')}</p>
        <p style="font-size:12px;color:var(--text-secondary);margin-bottom:24px">${escHtml(me.email||'')}</p>
        <p class="panel-section-title">Real-Debrid API Key</p>
        <p style="font-size:12px;color:var(--text-secondary);margin-bottom:10px">Used for streaming. Get yours at <a href="https://real-debrid.com/apitoken" target="_blank" rel="noopener" style="color:var(--accent)">real-debrid.com/apitoken</a>.</p>
        <input class="input" id="rd-key-input" type="password" placeholder="${settings.rdMaskedKey || 'Paste your Real-Debrid API key'}" style="width:100%;margin-bottom:10px" />
        <button class="btn btn-primary" id="save-rd-btn" style="width:100%">Save Real-Debrid Key</button>
        <p id="rd-save-status" style="font-size:12px;margin-top:8px;min-height:16px"></p>

        <p class="panel-section-title" style="margin-top:24px">TorBox API Key</p>
        <p style="font-size:12px;color:var(--text-secondary);margin-bottom:10px">Required for search. Still needed even with Real-Debrid.</p>
        <input class="input" id="api-key-input" type="password" placeholder="${settings.maskedKey || 'Paste your TorBox API key'}" style="width:100%;margin-bottom:10px" />
        <button class="btn btn-primary" id="save-key-btn" style="width:100%">Save TorBox Key</button>
        <p id="save-status" style="font-size:12px;margin-top:8px;min-height:16px"></p>

        <div class="settings-guide">
          <p class="panel-section-title" style="margin-top:28px">How to get a TorBox API key</p>
          <ol class="settings-steps">
            <li>
              <span class="step-num">1</span>
              <div>
                <strong>Create an account</strong>
                <p>Go to <a href="https://torbox.app" target="_blank" rel="noopener">torbox.app</a> and sign up for a free account.</p>
              </div>
            </li>
            <li>
              <span class="step-num">2</span>
              <div>
                <strong>Subscribe to Pro — $10/mo</strong>
                <p>Go to the <strong>Plans</strong> page and pick the Pro plan. This unlocks streaming and gives you full access to cached torrents.</p>
              </div>
            </li>
            <li>
              <span class="step-num">3</span>
              <div>
                <strong>Open Settings</strong>
                <p>Click your profile icon in the top right, then go to <strong>Settings</strong>.</p>
              </div>
            </li>
            <li>
              <span class="step-num">4</span>
              <div>
                <strong>Copy your API key</strong>
                <p>Scroll to the bottom of the Settings page. You'll see your <strong>API Key</strong> — copy it and paste it above.</p>
              </div>
            </li>
          </ol>
        </div>`;
      document.getElementById('save-rd-btn').addEventListener('click', async () => {
        const key = document.getElementById('rd-key-input').value.trim();
        const status = document.getElementById('rd-save-status');
        if (!key) return;
        try {
          await saveRDApiKey(key);
          useRD = true;
          status.textContent = 'Saved! Real-Debrid is now active.'; status.style.color = '#4ade80';
          document.getElementById('rd-key-input').value = '';
          document.getElementById('rd-key-input').placeholder = '••••••••' + key.slice(-4);
        } catch { status.textContent = 'Failed to save.'; status.style.color = '#ef4444'; }
      });
      document.getElementById('save-key-btn').addEventListener('click', async () => {
        const key = document.getElementById('api-key-input').value.trim();
        const status = document.getElementById('save-status');
        try {
          await saveApiKey(key);
          status.textContent = 'Saved!'; status.style.color = '#4ade80';
        } catch { status.textContent = 'Failed to save.'; status.style.color = '#ef4444'; }
      });
    } catch { document.getElementById('panel-body').innerHTML = `<p class="sources-empty">Failed to load.</p>`; }
  }

  function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function escAttr(s) { return String(s).replace(/"/g,'&quot;'); }
</script>
</body>
</html>
