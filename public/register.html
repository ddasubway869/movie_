<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SLATE — Register</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
<div class="auth-page">
  <div class="auth-card" id="register-view">
    <h1 class="auth-title">Create account</h1>
    <form class="auth-form" id="register-form">
      <div id="error-msg" class="auth-error" style="display:none"></div>
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input class="input" id="username" type="text" autocomplete="username" placeholder="username" required />
      </div>
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input class="input" id="email" type="email" autocomplete="email" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="input" id="password" type="password" autocomplete="new-password" placeholder="••••••••" required minlength="8" />
      </div>
      <button class="btn btn-primary auth-submit" type="submit" id="submit-btn">Create account</button>
    </form>
    <div class="auth-footer">
      Already have an account? <a href="/">Sign in</a>
    </div>
  </div>

  <!-- Check your email screen -->
  <div class="auth-card" id="verify-view" style="display:none;text-align:center">
    <div class="verify-icon">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="4" width="20" height="16" rx="2"/>
        <path d="m2 7 10 7 10-7"/>
      </svg>
    </div>
    <h1 class="auth-title">Check your email</h1>
    <p class="verify-msg">We sent a verification link to <strong id="verify-email"></strong>. Click the link to activate your account.</p>
    <p class="verify-hint">Didn't get it? Check your spam folder or <button class="link-btn" id="resend-btn">resend the email</button>.</p>
    <div class="auth-footer" style="margin-top:24px">
      Already verified? <a href="/">Sign in</a>
    </div>
  </div>
</div>

<script type="module">
  import { getMe, register } from '/js/api.js';
  import { initTheme } from '/js/utils.js';
  initTheme();

  getMe().then(user => { if (user) window.location.href = '/browse.html'; });

  // Handle token-expired error from verify redirect
  const params = new URLSearchParams(location.search);
  if (params.get('error') === 'token-expired') {
    document.getElementById('error-msg').textContent = 'Your verification link has expired. Please register again.';
    document.getElementById('error-msg').style.display = 'block';
  } else if (params.get('error') === 'invalid-token') {
    document.getElementById('error-msg').textContent = 'Invalid verification link. Please register again.';
    document.getElementById('error-msg').style.display = 'block';
  }

  const form = document.getElementById('register-form');
  const errorMsg = document.getElementById('error-msg');
  const submitBtn = document.getElementById('submit-btn');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorMsg.style.display = 'none';
    submitBtn.disabled = true;
    submitBtn.textContent = 'Creating account…';
    const email = document.getElementById('email').value.trim();
    try {
      await register(
        document.getElementById('username').value.trim(),
        email,
        document.getElementById('password').value
      );
      // Show check-your-email screen
      document.getElementById('register-view').style.display = 'none';
      document.getElementById('verify-email').textContent = email;
      document.getElementById('verify-view').style.display = '';
    } catch (err) {
      errorMsg.textContent = err.message;
      errorMsg.style.display = 'block';
      submitBtn.disabled = false;
      submitBtn.textContent = 'Create account';
    }
  });
</script>
</body>
</html>
