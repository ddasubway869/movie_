<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SLATE — Register</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <h1 class="auth-title">Create account</h1>
    <form class="auth-form" id="register-form">
      <div id="error-msg" class="auth-error" style="display:none"></div>
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input class="input" id="username" type="text" autocomplete="username" placeholder="username" required />
      </div>
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input class="input" id="email" type="email" autocomplete="email" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="input" id="password" type="password" autocomplete="new-password" placeholder="••••••••" required minlength="8" />
      </div>
      <button class="btn btn-primary auth-submit" type="submit" id="submit-btn">Create account</button>
    </form>
    <div class="auth-footer">
      Already have an account? <a href="/">Sign in</a>
    </div>
  </div>
</div>

<script type="module">
  import { getMe, register } from '/js/api.js';
  import { initTheme } from '/js/utils.js';
  initTheme();

  getMe().then(user => { if (user) window.location.href = '/browse.html'; });

  const form = document.getElementById('register-form');
  const errorMsg = document.getElementById('error-msg');
  const submitBtn = document.getElementById('submit-btn');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorMsg.style.display = 'none';
    submitBtn.disabled = true;
    submitBtn.textContent = 'Creating account…';
    try {
      await register(
        document.getElementById('username').value.trim(),
        document.getElementById('email').value.trim(),
        document.getElementById('password').value
      );
      window.location.href = '/browse.html';
    } catch (err) {
      errorMsg.textContent = err.message;
      errorMsg.style.display = 'block';
      submitBtn.disabled = false;
      submitBtn.textContent = 'Create account';
    }
  });
</script>
</body>
</html>
